<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>引っかかり整理アプリ</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe3ee;
      --text: #1f2937;
      --sub: #5f6b7a;
      --accent: #2f6fed;
      --accent-soft: #e8f0ff;
      --dark: #1f334d;
      --shadow: 0 10px 30px rgba(22, 34, 51, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      margin-bottom: 18px;
    }

    .eyebrow {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
    }

    .lead {
      color: var(--sub);
      margin: 10px 0 18px;
      font-size: 16px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: #e7edf6;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      width: 25%;
      background: linear-gradient(90deg, #5b8cff, var(--accent));
      transition: width 0.25s ease;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .step-title {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .step-desc {
      margin: 0 0 20px;
      color: var(--sub);
      font-size: 15px;
    }

    .options-grid {
      display: grid;
      gap: 12px;
    }

    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }

    .option-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 16px 14px;
      border-radius: var(--radius);
      text-align: left;
      cursor: pointer;
      font-size: 16px;
      transition: 0.18s ease;
    }

    .option-btn:hover {
      border-color: #b8cae5;
      transform: translateY(-1px);
    }

    .option-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: #1b4db8;
      font-weight: 600;
    }

    .slider-wrap {
      padding: 10px 4px;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 14px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .level-box {
      margin-top: 22px;
      padding: 24px;
      background: #f4f7fb;
      border-radius: 20px;
      text-align: center;
    }

    .level-number {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .badge {
      background: #eef3fa;
      color: #405166;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .result-box,
    .rule-box,
    .note-box {
      border-radius: 20px;
      padding: 18px;
      margin-top: 14px;
    }

    .result-box {
      background: #fff;
      border: 1px solid var(--line);
    }

    .result-box h2 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.4;
    }

    .rule-box {
      background: var(--dark);
      color: #fff;
    }

    .rule-box .label {
      color: #c6d6f2;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .note-box {
      background: #f4f7fb;
      color: #4e5d71;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .controls-left,
    .controls-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .next-card {
      margin-top: 18px;
      border: 1px dashed #c7d5e9;
      background: #ffffffcc;
      border-radius: 22px;
      padding: 18px;
      color: var(--sub);
    }

    @media (max-width: 640px) {
      .card { padding: 18px; }
      .step-title { font-size: 22px; }
      .result-box h2 { font-size: 22px; }
      .controls { flex-direction: column; }
      .controls-left, .controls-right { width: 100%; }
      .controls .btn { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">入口版アプリ</div>
      <h1>引っかかり整理アプリ</h1>
      <p class="lead">怒りをなくすためではなく、今どこに残っているかを言葉にして、長引かせないための入口です。</p>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <section class="card">
      <h2 class="step-title" id="stepTitle"></h2>
      <p class="step-desc" id="stepDesc"></p>
      <div id="stepContent"></div>

      <div class="controls">
        <div class="controls-left">
          <button class="btn" id="backBtn">戻る</button>
          <button class="btn" id="resetBtn">最初から</button>
        </div>
        <div class="controls-right">
          <button class="btn btn-primary" id="nextBtn">次へ</button>
        </div>
      </div>
    </section>

    <section class="next-card">
      <strong>次の発展案</strong><br>
      次の版では、本の題材を参考にした「対策」パートとして、タイプ別の自分ルール、境界線の見方、記録機能を追加できます。
    </section>
  </div>

  <script>
    const feelings = [
      { id: 'anger', label: '腹が立つ' },
      { id: 'frustration', label: '悔しい' },
      { id: 'tired', label: 'しんどい' },
      { id: 'empty', label: 'むなしい' },
      { id: 'unfair', label: '理不尽' },
      { id: 'anxious', label: '不安' },
      { id: 'guilty', label: 'うしろめたい' }
    ];

    const triggers = [
      { id: 'ignored', label: 'ないがしろにされた感じ' },
      { id: 'unfairness', label: '理不尽さ' },
      { id: 'couldnt_say', label: '言えなかった悔しさ' },
      { id: 'imbalance', label: '仕事の偏り' },
      { id: 'tone', label: '相手の言い方' },
      { id: 'home_overlap', label: '家のこととの重なり' }
    ];

    const messages = {
      ignored: {
        title: '今日は「見てもらえなかった感じ」が残っているのかもしれません',
        body: '怒りそのものより、雑に扱われた感じや、しんどさを見過ごされた感覚が強い日かもしれません。',
        rule: '今日は「怒っている」より先に、「ちゃんと見てほしかった」がないかを見てみる。'
      },
      unfairness: {
        title: '今日は「筋が通っていない感じ」に削られているのかもしれません',
        body: '相手個人というより、偏りや不公平さに強く反応している日かもしれません。',
        rule: '相手への怒りと、状況の理不尽さへの反応を分けてみる。'
      },
      couldnt_say: {
        title: '今日は「言えなかった悔しさ」が残っているのかもしれません',
        body: '相手への怒りと同じくらい、自分の飲み込み方にしんどさが残っていることがあります。',
        rule: '相手への怒りと、自分へのがっかりを別々に見る。'
      },
      imbalance: {
        title: '今日は「自分ばかり抱えている感じ」が残っているのかもしれません',
        body: '負担の偏りや、見えない持ち帰りが積み重なっている日かもしれません。',
        rule: '今日は全部を一人で抱えず、「どこまで自分の分か」を区切ってみる。'
      },
      tone: {
        title: '今日は「言い方の刺さり」が残っているのかもしれません',
        body: '内容よりも、言い方や空気で気持ちが削られていることがあります。',
        rule: '言われた内容と、刺さった言い方を分けてみる。'
      },
      home_overlap: {
        title: '今日は「家のこととの重なり」で残りやすい日かもしれません',
        body: '仕事の出来事だけでなく、家の心配が重なると気持ちは長引きやすくなります。',
        rule: '今日は解決より、「長引かせない」を優先してもいい日にする。'
      },
      default: {
        title: '今日は気持ちを整理するだけでも十分です',
        body: '感情をなくすより、今どこに残っているかを言葉にできるだけでも違います。',
        rule: '今は答えを出すより、「何が残っているか」を見る。'
      }
    };

    const stepMeta = {
      1: {
        title: '1. 今いちばん近い気持ちを選ぶ',
        desc: '怒りだけでなく、その手前の気持ちも含めて見ます。'
      },
      2: {
        title: '2. 何に引っかかったかを選ぶ',
        desc: '今日の引っかかり方に一番近いものを選びます。'
      },
      3: {
        title: '3. 今の残り方の強さを見る',
        desc: '0〜10で、今どれくらい残っているかを見ます。'
      },
      4: {
        title: '4. 今日の整理メモ',
        desc: '今日の状態を短く整理します。'
      }
    };

    let state = {
      step: 1,
      feeling: null,
      trigger: null,
      level: 5
    };

    const stepTitle = document.getElementById('stepTitle');
    const stepDesc = document.getElementById('stepDesc');
    const stepContent = document.getElementById('stepContent');
    const progressBar = document.getElementById('progressBar');
    const backBtn = document.getElementById('backBtn');
    const resetBtn = document.getElementById('resetBtn');
    const nextBtn = document.getElementById('nextBtn');

    function intensityLabel(level) {
      if (level <= 2) return '小さく残っている';
      if (level <= 5) return '気になる程度に残っている';
      if (level <= 8) return 'かなり残っている';
      return '強く残っている';
    }

    function feelingLabel(id) {
      const item = feelings.find(f => f.id === id);
      return item ? item.label : 'まだ言葉にならない';
    }

    function renderOptions(items, activeValue, onSelect, colsClass) {
      const wrap = document.createElement('div');
      wrap.className = `options-grid ${colsClass}`;

      items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'option-btn' + (activeValue === item.id ? ' active' : '');
        btn.textContent = item.label;
        btn.onclick = () => {
          onSelect(item.id);
          render();
        };
        wrap.appendChild(btn);
      });

      return wrap;
    }

    function renderStep1() {
      return renderOptions(feelings, state.feeling, (id) => state.feeling = id, 'grid-3');
    }

    function renderStep2() {
      return renderOptions(triggers, state.trigger, (id) => state.trigger = id, 'grid-2');
    }

    function renderStep3() {
      const wrap = document.createElement('div');
      wrap.className = 'slider-wrap';

      const labels = document.createElement('div');
      labels.className = 'slider-labels';
      labels.innerHTML = '<span>0：ほとんど残っていない</span><span>10：かなり強く残っている</span>';

      const range = document.createElement('input');
      range.type = 'range';
      range.min = '0';
      range.max = '10';
      range.step = '1';
      range.value = state.level;
      range.oninput = (e) => {
        state.level = Number(e.target.value);
        render();
      };

      const levelBox = document.createElement('div');
      levelBox.className = 'level-box';
      levelBox.innerHTML = `
        <div class="level-number">${state.level}</div>
        <div>${intensityLabel(state.level)}</div>
      `;

      wrap.appendChild(labels);
      wrap.appendChild(range);
      wrap.appendChild(levelBox);
      return wrap;
    }

    function renderStep4() {
      const selected = messages[state.trigger] || messages.default;
      const wrap = document.createElement('div');

      wrap.innerHTML = `
        <div class="badges">
          <div class="badge">今の気持ち：${feelingLabel(state.feeling)}</div>
          <div class="badge">残り方：${intensityLabel(state.level)}</div>
        </div>
        <div class="result-box">
          <h2>${selected.title}</h2>
          <div>${selected.body}</div>
        </div>
        <div class="rule-box">
          <div class="label">今日の小さな自分ルール</div>
          <div>${selected.rule}</div>
        </div>
        <div class="note-box">
          今は答えを急がなくても大丈夫です。まずは「何が残っているか」が見えただけでも、今日の整理としては十分です。
        </div>
      `;
      return wrap;
    }

    function canNext() {
      if (state.step === 1) return !!state.feeling;
      if (state.step === 2) return !!state.trigger;
      if (state.step === 3) return true;
      return false;
    }

    function render() {
      const meta = stepMeta[state.step];
      stepTitle.textContent = meta.title;
      stepDesc.textContent = meta.desc;
      progressBar.style.width = `${state.step * 25}%`;
      stepContent.innerHTML = '';

      if (state.step === 1) stepContent.appendChild(renderStep1());
      if (state.step === 2) stepContent.appendChild(renderStep2());
      if (state.step === 3) stepContent.appendChild(renderStep3());
      if (state.step === 4) stepContent.appendChild(renderStep4());

      backBtn.disabled = state.step === 1;
      nextBtn.style.display = state.step === 4 ? 'none' : 'inline-block';
      nextBtn.disabled = !canNext();
    }

    backBtn.onclick = () => {
      if (state.step > 1) {
        state.step -= 1;
        render();
      }
    };

    resetBtn.onclick = () => {
      state = { step: 1, feeling: null, trigger: null, level: 5 };
      render();
    };

    nextBtn.onclick = () => {
      if (canNext() && state.step < 4) {
        state.step += 1;
        render();
      }
    };

    render();
  </script>
</body>
</html>
